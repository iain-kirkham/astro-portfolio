name: Deploy Website

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::728092359661:role/frontend-github-actions-role
          aws-region: eu-west-2
      - name: Install modules
        run: pnpm install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm list playwright --depth=0 | grep playwright | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install playwright (for mermaid.js)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps
      - name: Build website
        run: pnpm build
        env:
          # rehype-mermaid uses Playwright to render diagrams during build
          # This ensures it runs in headless mode in CI
          PLAYWRIGHT_HEADLESS: 'true'
      - name: Deploy to S3
        run: aws s3 sync --delete --size-only ./dist/ s3://${{ secrets.BUCKET_ID }}
      - name: Create CloudFront invalidation
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

permissions:
  id-token: write
  contents: read